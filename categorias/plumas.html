<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Cuadernos</title>

  <link rel="stylesheet" href="../style.css">

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <script src="../productos.js"></script>
</head>

<body>

  <!-- Barra superior -->
  <div class="navbar">

    <a href="index.html" class="logo-btn">

      <img src="../logo.png" alt="Logo Papelería">

    </a>

    <div class="search-container">

      <input
      type="text"
      id="busqueda"
      placeholder="Buscar producto..."
      onkeyup="mostrarSugerencias()">

      <div id="sugerencias" class="sugerencias"></div>

    </div>

  </div>

  <!-- Contenido -->
  <div class="secciones">

    <h2>Cuadernos</h2>

    <div class="resultado" id="resultado"></div>

  </div>

  <script>

    const resultado =
    document.getElementById("resultado");

    const cuadernos = productos.filter(
      p => p.categoria === "cuadernos"
    );

    cuadernos.forEach(p => {

      resultado.innerHTML += `

        <div class="tarjeta">

          <img src="${p.imagen}" alt="${p.nombre}">

          <h3>${p.nombre}</h3>

          <p>Precio: ${p.precio}</p>

          <div class="${
            p.disponible
            ? 'disponible'
            : 'nodisponible'
          }">

            ${
              p.disponible
              ? 'Disponible'
              : 'No disponible'
            }

          </div>

        </div>

      `;

    });

    function mostrarSugerencias() {

      const texto =
      document.getElementById("busqueda")
      .value
      .toLowerCase();

      const sugerenciasDiv =
      document.getElementById("sugerencias");

      sugerenciasDiv.innerHTML = "";

      if (texto.length > 0) {

        const coincidencias = productos.filter(
          p => p.nombre.toLowerCase().includes(texto)
        );

        coincidencias.forEach(p => {

          const div = document.createElement("div");

          div.className = "sugerencia-item";

          div.innerHTML = `

            <strong>${p.nombre}</strong>

            <br>

            <small>

              ${p.precio}

              |

              ${
                p.disponible
                ? '🟢 Disponible'
                : '🔴 No disponible'
              }

            </small>

          `;

          div.onclick = () =>
          window.location.href = p.link;

          sugerenciasDiv.appendChild(div);

        });

        sugerenciasDiv.style.display = "block";

      } else {

        sugerenciasDiv.style.display = "none";

      }

    }

  </script>

</body>
</html>
