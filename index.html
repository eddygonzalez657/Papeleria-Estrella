<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Papelería - Inicio</title>

  <link rel="stylesheet" href="style.css">

  <!-- Font Awesome -->
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Productos -->
  <script src="productos.js"></script>
</head>

<body>

  <!-- Barra superior -->
  <div class="navbar">

    <img src="logo.png" alt="Logo Papelería">

    <div class="search-container">

      <input
      type="text"
      id="busqueda"
      placeholder="¿Qué estás buscando?"
      onkeyup="mostrarSugerencias()">

      <div id="sugerencias" class="sugerencias"></div>

    </div>

  </div>

  <!-- Secciones -->
  <div class="secciones">

    <h2>Secciones</h2>

    <div class="categorias">

      <a href="categorias/cuadernos.html" class="categoria-btn">
        <i class="fas fa-book-open"></i>
        Cuadernos
      </a>

      <a href="categorias/plumas.html" class="categoria-btn">
        <i class="fas fa-pen-nib"></i>
        Plumas
      </a>

      <a href="categorias/colores.html" class="categoria-btn">
        <i class="fas fa-palette"></i>
        Colores
      </a>

      <a href="pegamentos.html" class="categoria-btn">
        <i class="fas fa-tint"></i>
        Pegamentos
      </a>

      <a href="/categorias/" class="categoria-btn">
        <i class="fas fa-ruler-horizontal"></i>
        Reglas
      </a>

      <a href="categorias/tijeras.html" class="categoria-btn">
        <i class="fas fa-scissors"></i>
        Tijeras
      </a>

      <a href="borradores.html" class="categoria-btn">
        <i class="fas fa-eraser"></i>
        Borradores
      </a>

      <a href="lapices.html" class="categoria-btn">
        <i class="fas fa-pencil-alt"></i>
        Lápices
      </a>

      <a href="cartulinas.html" class="categoria-btn">
        <i class="fas fa-file-alt"></i>
        Cartulinas
      </a>

    </div>

  </div>

  <script>

    function mostrarSugerencias() {

      const texto =
      document.getElementById("busqueda")
      .value
      .toLowerCase();

      const sugerenciasDiv =
      document.getElementById("sugerencias");

      sugerenciasDiv.innerHTML = "";

      if (texto.length > 0) {

        const coincidencias = productos.filter(
          p => p.nombre.toLowerCase().includes(texto)
        );

        coincidencias.forEach(p => {

          const div = document.createElement("div");

          div.className = "sugerencia-item";

          div.innerHTML = `

            <strong>${p.nombre}</strong>

            <br>

            <small>

              ${p.precio}

              |

              ${
                p.disponible
                ? '🟢 Disponible'
                : '🔴 No disponible'
              }

            </small>

          `;

          div.onclick = () =>
          window.location.href = p.link;

          sugerenciasDiv.appendChild(div);

        });

        sugerenciasDiv.style.display = "block";

      } else {

        sugerenciasDiv.style.display = "none";

      }

    }

  </script>

</body>
</html>
